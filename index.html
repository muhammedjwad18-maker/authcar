<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VelocityDrive | Premium Car Store with Profile</title>
  <!-- Google Fonts & simple reset -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f4f8;
      color: #0a1c2f;
      scroll-behavior: smooth;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #e2e8f0;
    }
    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* NAVBAR */
    .navbar {
      background: #0b1120;
      color: white;
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .nav-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .logo h2 {
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      cursor: pointer;
    }
    .logo span {
      color: #facc15;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .profile-icon, .cart-icon {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1e293b;
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
    }
    .profile-icon:hover, .cart-icon:hover {
      background: #334155;
      transform: scale(1.02);
    }
    .cart-icon {
      position: relative;
    }
    .cart-count {
      background: #facc15;
      color: #0b1120;
      font-weight: bold;
      border-radius: 50%;
      padding: 2px 8px;
      font-size: 0.75rem;
      position: absolute;
      top: -6px;
      right: -6px;
    }
    .cart-total-badge {
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* HERO */
    .hero {
      background: linear-gradient(125deg, #0b1120 0%, #16212e 100%);
      color: white;
      padding: 48px 0 64px;
      margin-bottom: 48px;
      border-radius: 0 0 36px 36px;
    }
    .hero-content {
      text-align: center;
    }
    .hero h1 {
      font-size: 3.2rem;
      font-weight: 800;
    }
    .hero p {
      font-size: 1.2rem;
      opacity: 0.85;
      max-width: 600px;
      margin: 16px auto 0;
    }

    /* FILTER & SEARCH */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 42px;
      background: white;
      padding: 12px 24px;
      border-radius: 60px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.03);
    }
    .search-box {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      padding: 8px 20px;
      border-radius: 40px;
      gap: 12px;
      flex: 1;
      max-width: 340px;
    }
    .search-box input {
      border: none;
      background: transparent;
      font-size: 0.95rem;
      outline: none;
      width: 100%;
      font-family: inherit;
    }
    .filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: #f1f5f9;
      border: none;
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: #0b1120;
      color: white;
    }

    /* CAR GRID */
    .cars-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 32px;
      margin-bottom: 70px;
    }
    .car-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      transition: 0.25s ease;
      box-shadow: 0 12px 26px -12px rgba(0,0,0,0.1);
    }
    .car-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 28px 34px -16px rgba(0,0,0,0.2);
    }
    .car-img {
      height: 210px;
      background-size: cover;
      background-position: center;
      position: relative;
      padding: 14px;
    }
    .car-category {
  background: rgba(0,0,0,0.7);
  -webkit-backdrop-filter: blur(4px);  /* Safari 9+ */
  backdrop-filter: blur(4px);          /* Standard */

      display: inline-block;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: white;
    }
    .car-info {
      padding: 20px 22px 24px;
    }
    .car-title {
      font-size: 1.45rem;
      font-weight: 800;
    }
    .car-price {
      font-size: 1.7rem;
      font-weight: 800;
      color: #0b1120;
      margin: 12px 0 8px;
    }
    .car-price small {
      font-size: 0.8rem;
      font-weight: 400;
    }
    .car-specs {
      display: flex;
      gap: 14px;
      margin-bottom: 22px;
      color: #475569;
      font-size: 0.85rem;
    }
    .btn-add {
      background: #0b1120;
      border: none;
      width: 100%;
      padding: 12px;
      font-weight: 700;
      border-radius: 40px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-add:hover {
      background: #facc15;
      color: #0b1120;
    }

    /* PROFILE MODAL */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .profile-modal {
      background: white;
      max-width: 500px;
      width: 90%;
      border-radius: 36px;
      padding: 28px 32px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.3);
      transform: scale(0.97);
      transition: transform 0.2s;
    }
    .modal-overlay.active .profile-modal {
      transform: scale(1);
    }
    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 2px solid #eef2ff;
      padding-bottom: 14px;
    }
    .profile-header h2 {
      font-size: 1.8rem;
    }
    .close-modal {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
    }
    .avatar {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .avatar-circle {
      background: #0b1120;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #facc15;
    }
    .profile-field {
      margin-bottom: 20px;
    }
    .profile-field label {
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }
    .profile-field input, .profile-field textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 28px;
      border: 1px solid #cbd5e1;
      font-family: inherit;
      outline: none;
    }
    .save-profile {
      background: #0b1120;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 40px;
      font-weight: 700;
      margin-top: 12px;
      cursor: pointer;
    }

    /* CART SIDEBAR */
    .cart-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .cart-overlay.open {
      visibility: visible;
      opacity: 1;
    }
    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -460px;
      width: 100%;
      max-width: 440px;
      height: 100%;
      background: white;
      z-index: 201;
      box-shadow: -8px 0 30px rgba(0,0,0,0.2);
      transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: flex;
      flex-direction: column;
    }
    .cart-overlay.open .cart-sidebar {
      right: 0;
    }
    .cart-header {
      padding: 24px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
    }
    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
    }
    .cart-item {
      display: flex;
      gap: 14px;
      background: #f8fafc;
      border-radius: 24px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .cart-item-img {
      width: 70px;
      height: 70px;
      background-size: cover;
      border-radius: 18px;
    }
    .cart-item-details {
      flex: 1;
    }
    .cart-qty {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
    }
    .cart-qty button {
      background: #e2e8f0;
      border: none;
      width: 28px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }
    .remove-item {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .cart-footer {
      padding: 20px;
      border-top: 2px solid #eef2ff;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      font-weight: 800;
      font-size: 1.3rem;
      margin-bottom: 18px;
    }
    .checkout-btn {
      background: #0b1120;
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    footer {
      background: #0b1120;
      color: #94a3b8;
      text-align: center;
      padding: 28px;
    }
    @media (max-width: 720px) {
      .filter-bar { border-radius: 28px; flex-direction: column; align-items: stretch; }
      .hero h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="container nav-flex">
    <div class="logo" id="homeLogo">
      <h2>Velocity<span>Drive</span></h2>
    </div>
    <div class="nav-actions">
      <div class="profile-icon" id="profileBtn">
        <i class="fas fa-user-circle"></i> <span>Profile</span>
      </div>
      <div class="cart-icon" id="cartIconBtn">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
        <span class="cart-total-badge" id="cartTotalPreview">$0</span>
      </div>
    </div>
  </div>
</div>

<section class="hero">
  <div class="container hero-content">
    <h1>Your Drive, Your Style</h1>
    <p>Elite performance & luxury — curate your collection and manage your profile.</p>
  </div>
</section>

<div class="container">
  <div class="filter-bar">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by model...">
    </div>
    <div class="filter-group" id="filterGroup">
      <button data-cat="all" class="filter-btn active">All</button>
      <button data-cat="sport" class="filter-btn">Sport</button>
      <button data-cat="luxury" class="filter-btn">Luxury</button>
      <button data-cat="electric" class="filter-btn">Electric</button>
      <button data-cat="suv" class="filter-btn">SUV</button>
    </div>
  </div>
  <div class="cars-grid" id="carsGrid"></div>
</div>

<footer>
  <div class="container">
    <p><i class="fas fa-gem"></i> VelocityDrive — Premium automotive experience. Drive the future.</p>
  </div>
</footer>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal-overlay">
  <div class="profile-modal">
    <div class="profile-header">
      <h2><i class="fas fa-id-card"></i> Your Profile</h2>
      <button class="close-modal" id="closeProfileModal">&times;</button>
    </div>
    <div class="avatar">
      <div class="avatar-circle" id="avatarPreview">
        <i class="fas fa-user-astronaut"></i>
      </div>
    </div>
    <div class="profile-field">
      <label>Full Name</label>
      <input type="text" id="profileName" placeholder="John Velocity" value="Alex Rivera">
    </div>
    <div class="profile-field">
      <label>Email Address</label>
      <input type="email" id="profileEmail" placeholder="alex@velocitydrive.com" value="alex.r@velocitydrive.com">
    </div>
    <div class="profile-field">
      <label>Favorite Car Quote</label>
      <textarea id="profileBio" rows="2" placeholder="Your car motto...">"Horsepower is happiness."</textarea>
    </div>
    <button class="save-profile" id="saveProfileBtn"><i class="fas fa-save"></i> Save Changes</button>
  </div>
</div>

<!-- CART SIDEBAR -->
<div id="cartOverlay" class="cart-overlay">
  <div class="cart-sidebar">
    <div class="cart-header">
      <h2><i class="fas fa-shopping-bag"></i> My Garage</h2>
      <button class="close-cart" id="closeCartBtn" style="background:none; border:none; font-size:1.8rem; cursor:pointer;">&times;</button>
    </div>
    <div class="cart-items" id="cartItemsList">
      <div class="empty-cart" style="text-align:center; padding:40px;">Your garage is empty.</div>
    </div>
    <div class="cart-footer">
      <div class="total-row"><span>Total:</span><span id="cartTotalAmount">$0</span></div>
      <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-credit-card"></i> Checkout</button>
    </div>
  </div>
</div>

<script>
  // ---------- CAR DATA ----------
  const carsData = [
    { id: 1, name: "Ferrari F8 Tributo", price: 280000, category: "sport", img: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=600&auto=format", specs: "V8 Twin-Turbo, 710hp" },
    { id: 2, name: "Lamborghini Huracán", price: 320000, category: "sport", img: "https://images.unsplash.com/photo-1621135802920-133df287f89c?w=600&auto=format", specs: "V10, 631hp" },
    { id: 3, name: "Rolls-Royce Ghost", price: 350000, category: "luxury", img: "https://images.unsplash.com/photo-1631295788915-8e56b8e1b3c1?w=600&auto=format", specs: "6.75L V12, 563hp" },
    { id: 4, name: "Tesla Model S Plaid", price: 135000, category: "electric", img: "https://images.unsplash.com/photo-1617886903350-df2b6f7c7d0f?w=600&auto=format", specs: "Tri-Motor AWD, 1020hp" },
    { id: 5, name: "Porsche Cayenne Turbo GT", price: 185000, category: "suv", img: "https://images.unsplash.com/photo-1606016159991-dfe4f2746ad5?w=600&auto=format", specs: "V8, 631hp, AWD" },
    { id: 6, name: "Mercedes-Benz S-Class", price: 115000, category: "luxury", img: "https://images.unsplash.com/photo-1621075160523-b936ad96132a?w=600&auto=format", specs: "3.0L I6 Mild Hybrid" },
    { id: 7, name: "Rivian R1S", price: 92000, category: "electric", img: "https://images.unsplash.com/photo-1660506033877-63a13dfe2d1b?w=600&auto=format", specs: "Quad-Motor, 835hp" },
    { id: 8, name: "BMW X7 M60i", price: 108000, category: "suv", img: "https://images.unsplash.com/photo-1607853204434-ee0f0b3d5ef7?w=600&auto=format", specs: "V8, 523hp" },
    { id: 9, name: "McLaren Artura", price: 225000, category: "sport", img: "https://images.unsplash.com/photo-1623316665114-023ad9c26fa0?w=600&auto=format", specs: "Hybrid V6, 671hp" },
    { id: 10, name: "Audi RS e-tron GT", price: 147000, category: "electric", img: "https://images.unsplash.com/photo-1614200187524-dc4b892acf16?w=600&auto=format", specs: "Dual Motor, 637hp" }
  ];

  let cart = []; // {id, quantity}
  let activeCategory = "all";
  let searchQuery = "";

  // DOM elements
  const carsGrid = document.getElementById('carsGrid');
  const searchInput = document.getElementById('searchInput');
  const filterBtns = document.querySelectorAll('.filter-btn');
  const cartCountSpan = document.getElementById('cartCount');
  const cartTotalPreviewSpan = document.getElementById('cartTotalPreview');
  const cartOverlay = document.getElementById('cartOverlay');
  const cartItemsList = document.getElementById('cartItemsList');
  const cartTotalAmountSpan = document.getElementById('cartTotalAmount');
  const openCartBtn = document.getElementById('cartIconBtn');
  const closeCartBtn = document.getElementById('closeCartBtn');
  const checkoutBtn = document.getElementById('checkoutBtn');
  // Profile modal elements
  const profileModal = document.getElementById('profileModal');
  const profileBtn = document.getElementById('profileBtn');
  const closeProfileModal = document.getElementById('closeProfileModal');
  const saveProfileBtn = document.getElementById('saveProfileBtn');
  const profileNameInput = document.getElementById('profileName');
  const profileEmailInput = document.getElementById('profileEmail');
  const profileBioInput = document.getElementById('profileBio');
  const avatarPreview = document.getElementById('avatarPreview');

  // Helper: update cart UI (count + preview + sidebar)
  function updateCartUI() {
    const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
    const totalPrice = cart.reduce((sum, i) => {
      const car = carsData.find(c => c.id === i.id);
      return sum + (car ? car.price * i.quantity : 0);
    }, 0);
    cartCountSpan.innerText = totalItems;
    cartTotalPreviewSpan.innerText = `$${totalPrice.toLocaleString()}`;
    cartTotalAmountSpan.innerText = `$${totalPrice.toLocaleString()}`;
    renderCartSidebar();
  }

  function renderCartSidebar() {
    if (!cartItemsList) return;
    if (cart.length === 0) {
      cartItemsList.innerHTML = `<div class="empty-cart" style="text-align:center; padding:40px;"><i class="fas fa-car-side"></i> No cars selected.</div>`;
      return;
    }
    cartItemsList.innerHTML = '';
    cart.forEach(cartItem => {
      const car = carsData.find(c => c.id === cartItem.id);
      if (!car) return;
      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `
        <div class="cart-item-img" style="background-image:url('${car.img}'); background-size:cover;"></div>
        <div class="cart-item-details">
          <strong>${car.name}</strong><br>
          <span>$${car.price.toLocaleString()}</span>
          <div class="cart-qty">
            <button class="decr-qty" data-id="${car.id}">-</button>
            <span>${cartItem.quantity}</span>
            <button class="incr-qty" data-id="${car.id}">+</button>
            <strong>$${(car.price * cartItem.quantity).toLocaleString()}</strong>
          </div>
        </div>
        <button class="remove-item" data-id="${car.id}"><i class="fas fa-trash-alt"></i></button>
      `;
      cartItemsList.appendChild(div);
    });
    document.querySelectorAll('.decr-qty').forEach(btn => btn.addEventListener('click', (e) => {
      const id = parseInt(btn.dataset.id);
      updateQuantity(id, -1);
    }));
    document.querySelectorAll('.incr-qty').forEach(btn => btn.addEventListener('click', (e) => {
      const id = parseInt(btn.dataset.id);
      updateQuantity(id, 1);
    }));
    document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', (e) => {
      const id = parseInt(btn.dataset.id);
      removeFromCart(id);
    }));
  }

  function updateQuantity(id, delta) {
    const idx = cart.findIndex(i => i.id === id);
    if (idx !== -1) {
      const newQty = cart[idx].quantity + delta;
      if (newQty <= 0) cart.splice(idx,1);
      else cart[idx].quantity = newQty;
    } else if (delta > 0) cart.push({ id, quantity: 1 });
    updateCartUI();
    renderCars(); // update button states
  }
  function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    updateCartUI();
    renderCars();
  }
  function addToCart(id) {
    const existing = cart.find(i => i.id === id);
    if (existing) existing.quantity += 1;
    else cart.push({ id, quantity: 1 });
    updateCartUI();
    renderCars();
  }

  function getFilteredCars() {
    let filtered = [...carsData];
    if (activeCategory !== 'all') filtered = filtered.filter(c => c.category === activeCategory);
    if (searchQuery.trim()) filtered = filtered.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
    return filtered;
  }

  function renderCars() {
    const filtered = getFilteredCars();
    if (filtered.length === 0) {
      carsGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;">✨ No cars match — adjust filters.</div>`;
      return;
    }
    carsGrid.innerHTML = '';
    filtered.forEach(car => {
      const cartItem = cart.find(i => i.id === car.id);
      const qty = cartItem ? cartItem.quantity : 0;
      const btnText = qty > 0 ? `🛒 In Cart (${qty})` : `Add to Cart`;
      const card = document.createElement('div');
      card.className = 'car-card';
      card.innerHTML = `
        <div class="car-img" style="background-image: linear-gradient(to top, rgba(0,0,0,0.2), rgba(0,0,0,0.05)), url('${car.img}');">
          <span class="car-category">${car.category.toUpperCase()}</span>
        </div>
        <div class="car-info">
          <div class="car-title">${car.name}</div>
          <div class="car-price">$${car.price.toLocaleString()} <small>MSRP</small></div>
          <div class="car-specs"><i class="fas fa-gauge-high"></i> ${car.specs}</div>
          <button class="btn-add" data-id="${car.id}"><i class="fas fa-cart-plus"></i> ${btnText}</button>
        </div>
      `;
      carsGrid.appendChild(card);
    });
    document.querySelectorAll('.btn-add').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        addToCart(id);
        const newQty = cart.find(i => i.id === id)?.quantity || 0;
        btn.innerHTML = `<i class="fas fa-check"></i> Added!`;
        setTimeout(() => {
          btn.innerHTML = `<i class="fas fa-cart-plus"></i> ${newQty > 0 ? `In Cart (${newQty})` : `Add to Cart`}`;
        }, 500);
      });
    });
  }

  // Profile logic with local storage persistence
  function loadProfile() {
    const savedName = localStorage.getItem('profileName');
    const savedEmail = localStorage.getItem('profileEmail');
    const savedBio = localStorage.getItem('profileBio');
    if (savedName) profileNameInput.value = savedName;
    if (savedEmail) profileEmailInput.value = savedEmail;
    if (savedBio) profileBioInput.value = savedBio;
    updateAvatarPreview();
  }
  function updateAvatarPreview() {
    const name = profileNameInput.value.trim() || "User";
    const firstLetter = name.charAt(0).toUpperCase();
    avatarPreview.innerHTML = `<span style="font-size:2.8rem;">${firstLetter}</span>`;
  }
  function saveProfileData() {
    localStorage.setItem('profileName', profileNameInput.value);
    localStorage.setItem('profileEmail', profileEmailInput.value);
    localStorage.setItem('profileBio', profileBioInput.value);
    updateAvatarPreview();
    alert("✅ Profile updated successfully!");
    profileModal.classList.remove('active');
  }

  // Event listeners & modal logic
  function initModals() {
    profileBtn.addEventListener('click', () => {
      loadProfile(); // refresh fields before showing
      profileModal.classList.add('active');
    });
    closeProfileModal.addEventListener('click', () => profileModal.classList.remove('active'));
    saveProfileBtn.addEventListener('click', saveProfileData);
    profileModal.addEventListener('click', (e) => { if(e.target === profileModal) profileModal.classList.remove('active'); });
    // cart sidebar
    openCartBtn.addEventListener('click', () => { cartOverlay.classList.add('open'); renderCartSidebar(); });
    closeCartBtn.addEventListener('click', () => cartOverlay.classList.remove('open'));
    cartOverlay.addEventListener('click', (e) => { if(e.target === cartOverlay) cartOverlay.classList.remove('open'); });
    checkoutBtn.addEventListener('click', () => {
      if(cart.length===0) alert("Your garage is empty. Add some dream cars first!");
      else {
        const total = cart.reduce((sum,i) => sum + (carsData.find(c=>c.id===i.id)?.price||0)*i.quantity,0);
        alert(`🏁 Order placed! Total: $${total.toLocaleString()}. Thank you for driving with VelocityDrive.`);
        cart = [];
        updateCartUI();
        renderCars();
        cartOverlay.classList.remove('open');
      }
    });
    document.getElementById('homeLogo')?.addEventListener('click', () => {
      activeCategory = 'all';
      searchQuery = '';
      searchInput.value = '';
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
      renderCars();
    });
  }

  function initFiltersAndSearch() {
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.cat;
        renderCars();
      });
    });
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderCars();
    });
  }

  function initDemoCart() {
    // optional prefill nothing clean
    cart = [];
    updateCartUI();
    renderCars();
    loadProfile();
  }

  initModals();
  initFiltersAndSearch();
  initDemoCart();
  updateAvatarPreview();
</script>
</body>
</html>
