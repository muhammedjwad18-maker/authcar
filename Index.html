<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoLux Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background:#f5f7fa;
  transition:.3s;
}

.dark{
  background:#0f172a;
  color:#fff;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:40px;
  margin-bottom:10px;
}

.search-box{
  margin-top:20px;
}

input{
  padding:10px;
  width:250px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,.1);
  transition:.3s;
}

.dark .card{
  background:#1e293b;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  border-radius:10px;
}

.price{
  color:#10b981;
  font-weight:bold;
}

/* BUTTONS */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:5px;
}

.wish.active{
  color:red;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.active{
  display:flex;
}

.modal-box{
  background:#fff;
  padding:20px;
  border-radius:15px;
  max-width:400px;
}

.dark .modal-box{
  background:#1e293b;
}

/* DARK BTN */
.dark-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px;
  border-radius:50%;
}

</style>
</head>

<body>

<nav class="container">
  <div class="logo">AutoLux</div>
  <div>Wishlist: <span id="count">0</span></div>
</nav>

<section class="hero">
  <h1>Find Your Dream Car</h1>
  <p>Luxury cars with the best deals</p>

  <div class="search-box">
    <input id="search" placeholder="Search car...">
  </div>
</section>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<button class="dark-btn" onclick="toggleDark()">🌙</button>

<script>
const cars = [
 {id:1,name:"BMW M5",brand:"BMW",price:120000,img:"https://images.unsplash.com/photo-1555215695-3004980ad54e?w=600",desc:"Powerful German beast"},
 {id:2,name:"Mercedes S-Class",brand:"Mercedes",price:180000,img:"https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?w=600",desc:"Luxury at its peak"},
 {id:3,name:"Audi RS7",brand:"Audi",price:130000,img:"https://images.unsplash.com/photo-1548686304-89d188a80029?w=600",desc:"Sport + comfort"},
 {id:4,name:"Porsche 911",brand:"Porsche",price:210000,img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=600",desc:"Legendary speed"},
];

let wishlist = JSON.parse(localStorage.getItem("wish")) || [];

function render(list=cars){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  list.forEach(car=>{
    const fav=wishlist.includes(car.id);

    grid.innerHTML+=`
    <div class="card">
      <img src="${car.img}">
      <h3>${car.name}</h3>
      <p>${car.brand}</p>
      <p class="price">$${car.price}</p>

      <button class="wish ${fav?'active':''}" onclick="toggle(${car.id})">
        ${fav?'♥':'♡'}
      </button>

      <button onclick="openModal(${car.id})">View</button>
    </div>`;
  });

  document.getElementById("count").innerText=wishlist.length;
}

function toggle(id){
  if(wishlist.includes(id)){
    wishlist=wishlist.filter(x=>x!==id);
  }else{
    wishlist.push(id);
  }
  localStorage.setItem("wish",JSON.stringify(wishlist));
  render();
}

document.getElementById("search").oninput=e=>{
  const q=e.target.value.toLowerCase();
  const filtered=cars.filter(c=>c.name.toLowerCase().includes(q));
  render(filtered);
};

function openModal(id){
  const car=cars.find(c=>c.id===id);
  document.getElementById("title").innerText=car.name;
  document.getElementById("desc").innerText=car.desc;
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
